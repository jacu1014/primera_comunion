<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Aventura de Primera Comunión 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #D4AF37; /* Oro más real */
            --oro-claro: #F1E5AC;
            --uva: #5B2C6F; /* Morado litúrgico */
            --celeste: #EBF5FB;
            --fondo: #F4F4F4;
            --verde: #145A32; /* Verde eclesiástico */
            --blanco-papel: #FDFCF0; /* Color crema/pergamino */
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--fondo);
            /* Textura sutil de fondo */
            background-image: radial-gradient(var(--oro-claro) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* Barra de progreso con estilo de cinta */
        .progress-container {
            position: fixed;
            top: 0;
            width: 100%;
            height: 12px;
            background: #d1d1d1;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--oro), #FFD700);
            transition: width 0.8s ease;
        }

        header {
            margin-top: 60px;
            text-align: center;
            padding: 30px;
            background: white;
            border: 3px double var(--oro);
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 600px;
        }

        h1 { 
            font-family: 'Cinzel', serif; 
            color: var(--uva); 
            font-size: 2rem; 
            margin: 0;
            letter-spacing: 2px;
        }

        .sub-titulo {
            font-family: 'Great Vibes', cursive;
            font-size: 1.8rem;
            color: var(--oro);
            margin-top: 5px;
        }

        .btn-reset {
            margin-top: 15px;
            background: transparent;
            color: #7f8c8d;
            border: 1px solid #bdc3c7;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-reset:hover { color: var(--uva); border-color: var(--uva); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1100px;
            padding: 40px 20px;
            perspective: 1500px;
        }

        /* DISEÑO DE TARJETAS MANTENIDO PERO ESTILIZADO */
        .card-container { height: 480px; cursor: pointer; }
        .card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card.flipped { transform: rotateY(180deg); }

        .front, .back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .front {
            background: white;
            justify-content: center;
            align-items: center;
            border: 4px inset var(--oro-claro);
            /* Marca de agua sutil (Cruz) */
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
        }

        .back {
            background: var(--blanco-papel);
            transform: rotateY(180deg);
            border: 4px double var(--oro);
            text-align: left;
        }

        .card.learned .front {
            border-color: var(--verde);
            background: #F0F9F4;
        }

        h2 { font-family: 'Cinzel', serif; color: var(--uva); font-size: 1.4rem; text-align: center; }
        h3 { font-family: 'Cinzel', serif; color: var(--uva); border-bottom: 2px solid var(--oro); padding-bottom: 5px; }

        .texto-oracion {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #2c3e50;
        }

        .btn-finish {
            background: var(--uva);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
            box-shadow: 0 4px 0 #4A235A;
        }
        .btn-finish:active { transform: translateY(2px); box-shadow: 0 2px 0 #4A235A; }
    </style>
</head>
<body>

    <div class="progress-container"><div id="progress-bar"></div></div>

    <header>
        <h1>Preparación Sagrada</h1>
        <div class="sub-titulo">Mi Camino a la Eucaristía</div>
        <button class="btn-reset" onclick="resetAll()">🔄 Reiniciar Progreso</button>
    </header>

    <div class="grid" id="game-grid"></div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <script>
        // Los datos se mantienen iguales
        const oraciones = [
            { icon: "🙏", tit: "Yo Confieso", txt: "Yo confieso ante Dios todopoderoso y ante vosotros, hermanos, que he pecado mucho de pensamiento, palabra, obra y omisión. Por mi culpa, por mi culpa, por mi gran culpa. Por eso ruego a Santa María, siempre Virgen, a los ángeles, a los santos y a vosotros, hermanos, que intercedáis por mí ante Dios, nuestro Señor. Amén." },
            { icon: "🎶", tit: "Gloria", txt: "Gloria a Dios en el cielo, y en la tierra paz a los hombres que ama el Señor. Por tu inmensa gloria te alabamos, te bendecimos, te adoramos, te glorificamos, te damos gracias, Señor Dios, Rey celestial, Dios Padre todopoderoso. Señor, Hijo único, Jesucristo; Señor Dios, Cordero de Dios, Hijo del Padre; tú que quitas el pecado del mundo, ten piedad de nosotros; tú que quitas el pecado del mundo, atiende nuestra súplica; tú que estás sentado a la derecha del Padre, ten piedad de nosotros; porque solo tú eres Santo, solo tú Señor, solo tú Altísimo, Jesucristo, con el Espíritu Santo en la gloria de Dios Padre. Amén." },
            { icon: "📜", tit: "El Credo", txt: "Creo en Dios, Padre todopoderoso, Creador del cielo y de la tierra. Creo en Jesucristo, su único Hijo, nuestro Señor, que fue concebido por obra y gracia del Espíritu Santo, nació de Santa María Virgen, padeció bajo el poder de Poncio Pilato, fue crucificado, muerto y sepultado, descendió a los infiernos, al tercer día resucitó de entre los muertos, subió a los cielos y está sentado a la derecha de Dios, Padre todopoderoso. Desde allí ha de venir a juzgar a vivos y muertos. Creo en el Espíritu Santo, la santa Iglesia católica, la comunión de los santos, el perdón de los pecados, la resurrección de la carne y la vida eterna. Amén." },
            { icon: "✨", tit: "Santo", txt: "Santo, Santo, Santo es el Señor, Dios del Universo. Llenos están el cielo y la tierra de tu gloria. Hosanna en el cielo. Bendito el que viene en nombre del Señor. Hosanna en el cielo." },
            { icon: "🍞", tit: "Padrenuestro", txt: "Padre nuestro, que estás en el cielo, santificado sea tu Nombre; venga a nosotros tu reino; hágase tu voluntad en la tierra como en el cielo. Danos hoy nuestro pan de cada día; perdona nuestras ofensas, como también nosotros perdonamos a los que nos ofenden; no nos dejes caer en la tentación, y líbranos del mal. Amén." },
            { icon: "🕊️", tit: "Cordero de Dios", txt: "Cordero de Dios, que quitas el pecado del mundo, ten piedad de nosotros. Cordero de Dios, que quitas el pecado del mundo, ten piedad de nosotros. Cordero de Dios, que quitas el pecado del mundo, danos la paz." }
        ];

        let learnedCount = JSON.parse(localStorage.getItem('progresoComunion')) || 0;
        let learnedStates = JSON.parse(localStorage.getItem('estadosOraciones')) || new Array(oraciones.length).fill(false);

        function render() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            oraciones.forEach((o, i) => {
                const div = document.createElement('div');
                div.className = 'card-container';
                const isLearned = learnedStates[i] ? 'learned' : '';
                div.innerHTML = `
                    <div class="card ${isLearned}" id="card-${i}">
                        <div class="front">
                            <div style="font-size:4.5rem; margin-bottom:10px;">${o.icon}</div>
                            <h2>${o.tit}</h2>
                            <p style="color:var(--oro); font-weight:bold; margin-top:15px; font-family:'Cinzel', serif; font-size:0.8rem;">
                                ${learnedStates[i] ? '📜 APRENDIDA' : 'TOCAR PARA ABRIR'}
                            </p>
                        </div>
                        <div class="back">
                            <h3>${o.tit}</h3>
                            <div style="flex-grow:1; overflow-y:auto; padding-right:10px; margin-bottom:10px;">
                                <p class="texto-oracion">${o.txt}</p>
                            </div>
                            <button class="btn-finish" onclick="finish(${i}, event)">Marcar como Aprendida</button>
                        </div>
                    </div>
                `;
                div.onclick = () => document.getElementById(`card-${i}`).classList.toggle('flipped');
                grid.appendChild(div);
            });
            updateProgressBar();
        }

        function finish(idx, e) {
            e.stopPropagation();
            const card = document.getElementById(`card-${idx}`);
            if(!learnedStates[idx]) {
                learnedStates[idx] = true;
                card.classList.add('learned');
                learnedCount++;
                save();
                updateProgressBar();
                // Confeti de colores blanco y oro (Vaticano)
                confetti({ 
                    particleCount: 150, 
                    spread: 70, 
                    origin: { y: 0.6 }, 
                    colors: ['#D4AF37', '#FFFFFF', '#F1E5AC'] 
                });
            }
            card.classList.remove('flipped');
            setTimeout(render, 800); // Re-render para actualizar etiquetas
        }

        function updateProgressBar() {
            const percent = (learnedCount / oraciones.length) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        function save() {
            localStorage.setItem('progresoComunion', JSON.stringify(learnedCount));
            localStorage.setItem('estadosOraciones', JSON.stringify(learnedStates));
        }

        function resetAll() {
            if(confirm("¿Deseas reiniciar tu camino de preparación?")) {
                learnedCount = 0;
                learnedStates = new Array(oraciones.length).fill(false);
                save();
                render();
            }
        }

        render();
    </script>
</body>
</html>
